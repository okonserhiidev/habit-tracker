services:
  - type: web
    name: habit-tracker-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-app.vercel.app
      - key: DATABASE_URL
        fromDatabase:
          name: habit-tracker-db
          property: connectionString

databases:
  - name: habit-tracker-db
    plan: free
    databaseName: habittracker
    user: habituser
