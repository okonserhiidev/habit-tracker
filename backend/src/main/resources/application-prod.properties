# PostgreSQL — DataSource is configured via RenderDataSourceConfig.java
# which converts Render's DATABASE_URL (postgres://user:pass@host/db) to JDBC format

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (set via environment variables)
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=2592000000

# CORS (set via environment variables)
cors.allowed-origins=${CORS_ORIGINS}

# Server
server.port=${PORT:8080}
