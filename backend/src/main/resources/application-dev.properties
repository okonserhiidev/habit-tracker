# H2 Database (local development)
spring.datasource.url=jdbc:h2:mem:habittracker
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=dev-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=2592000000

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:8081,http://localhost:19006
